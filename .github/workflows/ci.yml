name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.19.0']

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          cd nuevo-frontend
          npm ci

      - name: Run lint
        run: |
          cd nuevo-frontend
          npm run lint

      - name: Run unit tests
        run: |
          cd nuevo-frontend
          npm run test -- --coverage

      - name: Build production
        run: |
          cd nuevo-frontend
          npm run build

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nuevo-frontend

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.19.0
        uses: actions/setup-node@v3
        with:
          node-version: '20.19.0'

      - name: Install dependencies for E2E
        run: npm ci

      - name: Preview app
        run: |
          npm run build
          nohup npm run preview -- --port 5173 > ../preview.log 2>&1 &
        shell: bash

      - name: Wait for server to start
        run: |
          sleep 5 # espera 5 segundos para que el servidor arranque

      - name: Run Cypress tests
        uses: cypress-io/github-action@v5
        with:
          start: npm run cypress:run
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60

          name: Lint (ESLint)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Clona el repositorio
        uses: actions/checkout@v3

      - name: Instala Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instala dependencias
        run: npm install

      - name: Ejecuta ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx
