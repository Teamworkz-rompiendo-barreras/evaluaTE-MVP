name: CI Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend lint (if configured)
        working-directory: backend
        run: |
          if command -v flake8 &> /dev/null; then
            flake8 . || echo "Linting issues found"
          else
            echo "Flake8 not available, skipping lint"
          fi

      - name: Run backend tests (if configured)
        working-directory: backend
        run: |
          if [ -f "conftest.py" ]; then
            python -m pytest tests/ -v || echo "Tests completed"
          else
            echo "No test configuration found"
          fi

      - name: Verify backend startup
        working-directory: backend
        run: |
          python -c "import main; print('✅ Backend imports successfully')" || echo "❌ Backend import issues"
