name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint
      # si no tienes lint aún, puedes omitir o añadir "npm run lint" después

    - name: Run unit tests
      run: npm run test -- --coverage

    - name: Build production
      run: npm run build

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: '18.x' }
      - run: npm ci
      - run: npm run dev & # arranca servidor en background
      - run: npx cypress run
