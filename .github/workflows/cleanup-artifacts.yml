name: Cleanup Old Artifacts

on:
  schedule:
    # Ejecutar diariamente a las 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Permitir ejecución manual

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # Permiso para eliminar artifacts
      contents: read  # Permiso para leer el repositorio
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 7); // Mantener solo 7 días
            
            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              if (createdAt < cutoff) {
                console.log(`🗑️ Eliminando artifact antiguo: ${artifact.name} (creado: ${createdAt.toISOString()})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }
            
            console.log('✅ Limpieza de artifacts completada');
