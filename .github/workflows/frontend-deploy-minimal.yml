name: Frontend Deploy Minimal

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./nuevo-frontend
        run: npm install

      - name: Build project
        working-directory: ./nuevo-frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ad5f34aebb8b854d7a97186453bc71a4a574acda6c1174870276da3619bd312706-131fe071-1100-48e3-9692-cb4df94c795f01e13320b6281c1e
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "nuevo-frontend"
          api_location: ""
          output_location: "dist"
          skip_app_build: false
          skip_api_build: true
