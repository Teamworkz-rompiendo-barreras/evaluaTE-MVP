# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python FastAPI app to Azure Web App - evaluador-backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_evaluador-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 with pip cache
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint (if configured)
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Linting completed"

      - name: Run tests (if configured)
        working-directory: ./backend
        run: |
          pip install pytest
          pytest tests/ || echo "Tests completed"
          
      - name: Verify Python application
        working-directory: ./backend
        run: |
          python -c "import main; print('✅ FastAPI app imported successfully')"
          echo "Python application verification completed"

      - name: Create minimal deploy artifact (whitelist)
        working-directory: ./backend
        run: |
          rm -rf ../backend_dist
          mkdir -p ../backend_dist
          rsync -a --prune-empty-dirs \
            --include="*/" \
            --include="*.py" \
            --include="requirements.txt" \
            --include="requirements-azure.txt" \
            --include="startup.py" \
            --include="startup.txt" \
            --exclude="*" \
            ./ ../backend_dist/
          cd ../backend_dist
          zip -r ../backend/release.zip .
          cd ../backend
          echo "Artifact size:" && du -h release.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend/release.zip
          retention-days: 1
          compression-level: 9

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: backend
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6E956FCBABCF40BA9ED41329E2F32514 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4130893AEC1849D7ADD562F76883DF6C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5B6BEDFF0DDF405CA801DE036686441D }}

      - name: Ensure Oryx remote build settings
        run: |
          az webapp config appsettings set \
            --name evaluador-backend \
            --resource-group evaluador-backend_group \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true ENABLE_ORYX_BUILD=true | cat

      - name: Configure startup command
        run: |
          az webapp config set \
            --resource-group evaluador-backend_group \
            --name evaluador-backend \
            --startup-file "python startup.py" | cat

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'evaluador-backend'
          slot-name: 'Production'
          package: backend/release.zip
          