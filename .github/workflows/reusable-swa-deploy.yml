name: "Reusable SWA Build & Deploy"

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version
        required: false
        type: string
        default: '20.x'
      app_location:
        description: Frontend app directory
        required: true
        type: string
      output_location:
        description: Build output directory relative to app_location
        required: true
        type: string

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Azure Static Web Apps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        working-directory: ${{ inputs.app_location }}
        run: npm install

      - name: Build project
        working-directory: ${{ inputs.app_location }}
        run: npm run build

      - name: Copy config if exists
        run: |
          if [ -f "${{ inputs.app_location }}/staticwebapp.config.json" ]; then
            cp "${{ inputs.app_location }}/staticwebapp.config.json" "${{ inputs.app_location }}/${{ inputs.output_location }}/"
          fi

      - name: Verify build artifacts
        run: |
          ls -la "${{ inputs.app_location }}/${{ inputs.output_location }}" || true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_EVALUADOR_FRONTEND }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ${{ inputs.app_location }}
          api_location: ""
          output_location: ${{ inputs.output_location }}
          skip_app_build: false
          skip_api_build: true


