<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvalúaTE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    .main-wrapper {
      max-width: 600px;
      margin: 40px auto 0 auto;
    }
    .form-container {
      background-color: white;
      padding: 28px 32px 20px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 24px 0 rgba(11,71,75,0.07);
      margin-bottom: 18px;
    }
    .form-container h1 {
      margin-top: 0;
      color: #0b474b;
      font-size: 2rem;
      letter-spacing: -1px;
    }
    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 3px;
      font-weight: 600;
      color: #184347;
    }
    input[type="text"], input[type="email"], input[type="tel"], select, input[type="file"] {
      width: 100%;
      padding: 10px 8px;
      border-radius: 8px;
      border: 1px solid #b6b6b6;
      font-size: 1rem;
      margin-bottom: 2px;
      background: #f9f9f7;
    }
    input[type="file"] {
      padding: 6px 0;
    }
    .inline-inputs {
      display: flex;
      gap: 12px;
    }
    .inline-inputs > div {
      flex: 1;
    }
    .info-extra {
      color: #666;
      font-size: 0.97em;
      margin-bottom: 0;
      margin-top: 0;
    }
    button, .softskills-link {
      background-color: #e6cb62;
      border: none;
      color: #0b474b;
      padding: 11px 24px;
      font-size: 1rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 16px;
      transition: background .15s;
      box-shadow: 0 2px 8px 0 rgba(11,71,75,0.06);
      text-align: center;
      display: inline-block;
    }
    button:hover, .softskills-link:hover {
      background-color: #d6bc5a;
    }
    .softskills-section {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      background: #fcfaf4;
      border-radius: 12px;
      box-shadow: 0 2px 8px 0 rgba(11,71,75,0.04);
      gap: 12px;
    }
    .softskills-section p {
      margin: 0;
      color: #184347;
      font-size: 1.09rem;
      font-weight: 500;
      flex: 1;
    }
    .enviar-todo-ctn {
      display: flex;
      justify-content: center;
      margin-top: 38px;
      margin-bottom: 32px;
    }
    #botonEnviarTodo:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #e6cb62;
      color: #0b474b;
    }
    .mensaje-envio {
      max-width: 600px;
      margin: 24px auto 0 auto;
      background: #f9f9f7;
      border-radius: 10px;
      padding: 24px 18px;
      text-align: center;
      font-size: 1.08rem;
      color: #0b474b;
      box-shadow: 0 2px 12px 0 rgba(11,71,75,0.07);
      display: none;
    }
    .mensaje-envio.exito {
      background: #e9fad9;
      color: #215d22;
      border: 1.5px solid #badc98;
    }
    .mensaje-envio.error {
      background: #fdeaea;
      color: #892010;
      border: 1.5px solid #f7b5b5;
    }
    @media (max-width: 600px) {
      .main-wrapper { padding: 0 2vw; }
      .form-container { padding: 18px 7vw 14px 7vw; }
      .softskills-section { flex-direction: column; align-items: flex-start; gap: 7px;}
      .enviar-todo-ctn { margin-top: 24px; margin-bottom: 14px;}
    }
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="form-container">
    <h1>EvalúaTE</h1>
    <form id="cvForm" enctype="multipart/form-data" autocomplete="off">
      <div class="inline-inputs">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" name="nombre" id="nombre" autocomplete="given-name" required />
        </div>
        <div>
          <label for="apellidos">Apellidos</label>
          <input type="text" name="apellidos" id="apellidos" autocomplete="family-name" required />
        </div>
      </div>
      <div class="inline-inputs">
        <div>
          <label for="email">Correo electrónico</label>
          <input type="email" name="email" id="email" autocomplete="email" />
        </div>
        <div>
          <label for="whatsapp">Whatsapp</label>
          <input type="tel" name="whatsapp" id="whatsapp" pattern="^[0-9\+\s\-]{7,}$" />
        </div>
      </div>
      <p class="info-extra">* Rellena al menos el correo electrónico o el whatsapp.</p>

      <label for="discapacidad">¿Tienes certificado de discapacidad?</label>
      <select name="discapacidad" id="discapacidad" required>
        <option value="">Selecciona una opción</option>
        <option value="sí">Sí</option>
        <option value="no">No</option>
      </select>

      <label for="tipo_puesto">¿Qué tipo de trabajo te gustaría hacer?</label>
      <input type="text" name="tipo_puesto" id="tipo_puesto" placeholder="Ej. Reparto, administración..." required />

      <label for="tipo_entorno">¿Tipo?</label>
      <select name="tipo_entorno" id="tipo_entorno" required>
        <option value="">Selecciona...</option>
        <option value="presencial">Presencial</option>
        <option value="remoto">Remoto</option>
        <option value="híbrido">Híbrido</option>
      </select>

      <label for="jornada">¿Qué jornada prefieres?</label>
      <select name="jornada" id="jornada" required>
        <option value="">Selecciona...</option>
        <option value="completa">Completa</option>
        <option value="parcial">Parcial</option>
        <option value="indiferente">Indiferente</option>
      </select>

      <label for="disponibilidad">Disponibilidad (horaria, inmediata, otras...)</label>
      <input type="text" name="disponibilidad" id="disponibilidad" placeholder="Ej. Mañanas, turnos, incorporación inmediata..." required />

      <label for="traslado">¿Disponibilidad para cambiar de residencia?</label>
      <select name="traslado" id="traslado" required>
        <option value="">Selecciona...</option>
        <option value="sí">Sí</option>
        <option value="no">No</option>
        <option value="indiferente">Indiferente</option>
      </select>

      <label for="cv">Sube tu CV (PDF)</label>
      <input type="file" name="cv" id="cv" accept="application/pdf" required />

      <button type="submit">Enviar CV</button>
    </form>

    <div class="softskills-section" style="margin-top: 24px;">
      <p>Accede al apartado de evaluación para completar las pruebas de habilidades blandas.</p>
      <a href="softskills.html" class="softskills-link">Ir a Evaluación de Soft Skills</a>
    </div>
  </div>

  <div class="enviar-todo-ctn">
    <button id="botonEnviarTodo" disabled>
      Enviar todo y ver resultados
    </button>
  </div>
  <div class="mensaje-envio" id="mensajeEnvio"></div>
</div>

<script>
  // Guardar campos automáticamente en localStorage
  function saveFieldToStorage(id, storageKey) {
    const input = document.getElementById(id);
    if (!input) return;
    const handler = () => {
      let value = input.value;
      // Para archivo, guarda sólo el nombre (o podrías guardar la URL cuando lo subas realmente)
      if (input.type === 'file') {
        value = input.files && input.files[0] ? input.files[0].name : "";
      }
      localStorage.setItem(storageKey, value);
    };
    input.addEventListener('input', handler);
    if (input.type === 'file') input.addEventListener('change', handler);
    // Al cargar, rellena el valor si existe
    const stored = localStorage.getItem(storageKey);
    if (stored) {
      if (input.type === 'file') {
        // No se puede restaurar file por seguridad navegador, omite
      } else {
        input.value = stored;
      }
    }
  }

  // Asocia todos los campos
  saveFieldToStorage('nombre', 'formulario_nombre');
  saveFieldToStorage('apellidos', 'formulario_apellidos');
  saveFieldToStorage('email', 'formulario_email');
  saveFieldToStorage('whatsapp', 'formulario_whatsapp');
  saveFieldToStorage('discapacidad', 'formulario_discapacidad');
  saveFieldToStorage('tipo_puesto', 'formulario_tipo_puesto');
  saveFieldToStorage('tipo_entorno', 'formulario_tipo_entorno');
  saveFieldToStorage('jornada', 'formulario_jornada');
  saveFieldToStorage('disponibilidad', 'formulario_disponibilidad');
  saveFieldToStorage('traslado', 'formulario_traslado');
  saveFieldToStorage('cv', 'formulario_cv_pdf');

  // Verificar progreso
  function verificarProgresoCompleto() {
    const juegos = [
      'minijuego_decisiones_score',
      'minijuego_resolucion_score',
      'minijuego_comunicacion_score',
      'minijuego_adaptabilidad_score',
      'minijuego_tiempo_score',
      'minijuego_equipo_score',
      'minijuego_creatividad_score',
      'minijuego_liderazgo_score',
      'minijuego_pensamiento_score',
      'minijuego_emocional_score'
    ];
    const todosJuegosListos = juegos.every(k => localStorage.getItem(k));
    const formOk = localStorage.getItem('formulario_nombre')
      && localStorage.getItem('formulario_apellidos')
      && (localStorage.getItem('formulario_email') || localStorage.getItem('formulario_whatsapp'))
      && localStorage.getItem('formulario_cv_pdf')
      && localStorage.getItem('formulario_tipo_puesto')
      && localStorage.getItem('formulario_tipo_entorno')
      && localStorage.getItem('formulario_jornada')
      && localStorage.getItem('formulario_disponibilidad')
      && localStorage.getItem('formulario_traslado')
      && localStorage.getItem('formulario_discapacidad');
    const boton = document.getElementById('botonEnviarTodo');
    if (todosJuegosListos && formOk) {
      boton.disabled = false;
      boton.style.opacity = 1;
      boton.style.cursor = 'pointer';
    } else {
      boton.disabled = true;
      boton.style.opacity = 0.45;
      boton.style.cursor = 'not-allowed';
    }
  }

  // Cada campo, cada cambio: verifica progreso
  document.querySelectorAll('input, select').forEach(e => {
    e.addEventListener('change', verificarProgresoCompleto);
    e.addEventListener('input', verificarProgresoCompleto);
  });
  // También al cargar
  document.addEventListener('DOMContentLoaded', verificarProgresoCompleto);

  // Al enviar el CV: guarda todos los campos rellenados en localStorage (por si no se ha hecho antes)
  document.getElementById('cvForm').addEventListener('submit', function(e) {
    const email = document.getElementById('email').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    if (!email && !whatsapp) {
      alert('Debes indicar al menos un email o un whatsapp de contacto.');
      e.preventDefault();
      return false;
    }
    // Se guardan todos los campos una vez más (ya se guardan, pero por seguridad)
    document.querySelectorAll('#cvForm input, #cvForm select').forEach(inp => {
      if (inp.type === 'file') {
        if (inp.files && inp.files[0]) {
          localStorage.setItem('formulario_cv_pdf', inp.files[0].name);
        }
      } else {
        localStorage.setItem('formulario_' + inp.name, inp.value);
      }
    });
    verificarProgresoCompleto();
    // No evitar el submit, deja que suba el archivo si tienes backend.
  });

  // Enviar todo: diálogo de confirmación
  document.getElementById('botonEnviarTodo')?.addEventListener('click', (ev) => {
    ev.preventDefault();
    if (!window.confirm('¿Estás seguro/a de que quieres enviar todos los datos y ver los resultados? Podrás volver atrás si quieres corregir algo antes de enviar.')) {
      return;
    }
    // Aquí puedes enviar los datos al backend. Simulamos resultado:
    enviarDatosFinales();
  });

  // Mensaje final tras intento de envío
  function mostrarMensajeEnvio(ok) {
    const msj = document.getElementById('mensajeEnvio');
    msj.style.display = 'block';
    if (ok) {
      msj.textContent = "¡Tus datos han sido enviados correctamente! Puedes revisar tu informe cuando lo desees.";
      msj.className = "mensaje-envio exito";
    } else {
      msj.textContent = "No se han podido enviar los datos por un problema temporal. Puedes intentarlo más tarde pulsando de nuevo en Enviar.";
      msj.className = "mensaje-envio error";
    }
    // Oculta el botón para evitar dobles envíos si es éxito
    if (ok) document.getElementById('botonEnviarTodo').style.display = 'none';
  }

  // Simulación de envío real (aquí pondrás la llamada real al backend)
  function enviarDatosFinales() {
    // Simulación: éxito o error aleatorio
    const exito = Math.random() > 0.1; // 90% de éxito simulado
    setTimeout(() => {
      mostrarMensajeEnvio(exito);
    }, 900);
  }
</script>
</body>
</html>
