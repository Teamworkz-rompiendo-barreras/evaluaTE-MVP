<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvalúaTE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    .form-container, .softskills-container, .cta-container {
      background-color: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      color: #0b474b;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input[type="text"], select, input[type="file"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      background-color: #e6cb62;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #c9b256;
    }
    .cta-button {
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>EvalúaTE</h1>
    <form id="cvForm" enctype="multipart/form-data">
      <label for="nombre">Nombre completo</label>
      <input type="text" name="nombre" required />

      <label for="discapacidad">¿Tienes certificado de discapacidad?</label>
      <select name="discapacidad" required>
        <option value="">Selecciona una opción</option>
        <option value="sí">Sí</option>
        <option value="no">No</option>
      </select>

      <label for="preferencia">¿Qué tipo de trabajo te gustaría hacer?</label>
      <input type="text" name="preferencia" placeholder="Ej. Reparto, administración..." required />

      <label for="cv">Sube tu CV (PDF)</label>
      <input type="file" name="cv" accept="application/pdf" required />

      <button type="submit">Enviar CV</button>
    </form>
  </div>

  <div class="cta-container">
    <h2>Evaluación de Soft Skills</h2>
    <p>Accede al apartado de evaluación para completar las pruebas de habilidades blandas.</p>
    <div class="cta-button">
      <button onclick="location.href='softskills.html'">Ir a Evaluación de Soft Skills</button>
    </div>
  </div>
  <div id="bloque-envio" style="text-align: center; margin-top: 40px;">
  <button id="botonEnviarTodo" disabled style="opacity: 0.5; cursor: not-allowed; background-color: #e6cb62; color: #0b474b; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem;">
    Enviar todo y ver resultados
  </button>
</div>
</body>
<script>
  function verificarProgresoCompleto() {
    const juegos = [
      'minijuego_decisiones_score',
      'minijuego_resolucion_score',
      'minijuego_comunicacion_score',
      'minijuego_adaptabilidad_score',
      'minijuego_tiempo_score',
      'minijuego_equipo_score',
      'minijuego_creatividad_score',
      'minijuego_liderazgo_score',
      'minijuego_pensamiento_score',
      'minijuego_emocional_score'
    ];

    const todosJuegosListos = juegos.every(k => localStorage.getItem(k));
    const formOk = localStorage.getItem('formulario_nombre') &&
                   localStorage.getItem('formulario_email') &&
                   localStorage.getItem('formulario_disponibilidad') &&
                   localStorage.getItem('formulario_cv_pdf') &&
                   localStorage.getItem('formulario_discapacidad') &&
                   localStorage.getItem('formulario_preferencias');

    const boton = document.getElementById('botonEnviarTodo');
    if (todosJuegosListos && formOk) {
      boton.disabled = false;
      boton.style.opacity = 1;
      boton.style.cursor = 'pointer';
    }
  }

  document.addEventListener('DOMContentLoaded', verificarProgresoCompleto);

  document.getElementById('botonEnviarTodo')?.addEventListener('click', () => {
    window.location.href = 'resultados.html';
  });
</script>
</html>
