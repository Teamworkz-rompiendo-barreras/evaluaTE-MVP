<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvalúaTE — Datos Personales</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <header><h1>EvalúaTE</h1></header>
  <main>
    <form id="form-datos">
      <label for="nombre">Nombre*</label>
      <input id="nombre" name="nombre" required />
      <label for="apellidos">Apellidos*</label>
      <input id="apellidos" name="apellidos" required />
      <fieldset>
        <legend>Contacto (al menos uno):</legend>
        <label><input type="email" id="email" name="email" /> Email</label>
        <label><input type="tel" id="whatsapp" name="whatsapp" /> WhatsApp</label>
      </fieldset>
      <!-- aquí puedes añadir tipo de puesto, modalidad, jornada, etc. -->
      <button type="submit" id="btn-ir-soft">Ir a evaluación de Soft Skills</button>
    </form>
  </main>
  <script>
    document.getElementById('form-datos').onsubmit = e => {
      e.preventDefault();
      const nombre = e.target.nombre.value.trim();
      const apellidos = e.target.apellidos.value.trim();
      const email = e.target.email.value.trim();
      const whatsapp = e.target.whatsapp.value.trim();
      if (!nombre || !apellidos || (!email && !whatsapp)) {
        alert('Por favor, rellena Nombre, Apellidos y al menos Email o WhatsApp.');
        return;
      }
      // Guardamos los datos en localStorage
      localStorage.setItem('usuario', JSON.stringify({ nombre, apellidos, email, whatsapp }));
      // Redirigimos a la página de minijuegos
      window.location.href = 'softskills.html';
    };
  </script>
</body>
</html>
