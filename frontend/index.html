<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvalúaTE</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <div class="contenedor">
    <h1>EvalúaTE</h1>
    <p>Por favor completa tus datos personales y laborales antes de comenzar.</p>

    <form id="form-datos-personales">
      <div class="form-row">
        <div>
          <label for="nombre">Nombre<span class="field-required">*</span></label>
          <input type="text" name="nombre" id="nombre" required />
        </div>
        <div>
          <label for="apellidos">Apellidos<span class="field-required">*</span></label>
          <input type="text" name="apellidos" id="apellidos" required />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="email">Email</label>
          <input type="email" name="email" id="email" placeholder="Opcional, pero rellena al menos uno" />
        </div>
        <div>
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" name="whatsapp" id="whatsapp" placeholder="Opcional, pero rellena al menos uno" />
        </div>
      </div>

      <label for="tipo-puesto">Tipo de puesto<span class="field-required">*</span></label>
      <input
        type="text"
        name="tipo"
        id="tipo"
        placeholder="Ej. Administrativo, almacén..."
        required
      />

      <label for="tipo-trabajo">Modalidad<span class="field-required">*</span></label>
      <select name="tipo-trabajo" id="tipo-trabajo" required>
        <option value="">Selecciona modalidad</option>
        <option value="remoto">Remoto</option>
        <option value="presencial">Presencial</option>
        <option value="hibrido">Híbrido</option>
      </select>

      <label for="jornada">Jornada<span class="field-required">*</span></label>
      <select name="jornada" id="jornada" required>
        <option value="">Selecciona jornada</option>
        <option value="completa">Completa</option>
        <option value="parcial">Parcial</option>
        <option value="intensiva">Intensiva</option>
      </select>

      <label for="disponibilidad">
        Disponibilidad (horaria, inmediata, otras...)
      </label>
      <input
        type="text"
        name="disponibilidad"
        id="disponibilidad"
        placeholder="Ej. Mañanas, inmediata, tardes..."
      />

      <label for="traslado">
        ¿Estarías dispuesto/a a trasladarte a otro lugar por trabajo?
      </label>
      <select name="traslado" id="traslado">
        <option value="">Selecciona una opción</option>
        <option value="si">Sí</option>
        <option value="no">No</option>
        <option value="depende">Depende</option>
      </select>

      <label for="discapacidad">
        ¿Tienes certificado de discapacidad?<span class="field-required">*</span>
      </label>
      <select name="discapacidad" id="discapacidad" required>
        <option value="">Selecciona una opción</option>
        <option value="sí">Sí</option>
        <option value="no">No</option>
      </select>

      <!-- Advertencia si no hay email o whatsapp -->
      <div id="contact-warning" class="warning">
        Debes completar al menos Email o WhatsApp para continuar.
      </div>

      <button type="button" id="btn-guardar-pers" class="boton-principal">
        Guardar y Continuar
      </button>
    </form>
  </div>

  <script>
    // Al cargar la página, restauramos valores guardados en localStorage (si existen)
    window.addEventListener("DOMContentLoaded", () => {
      const campos = [
        "nombre",
        "apellidos",
        "email",
        "whatsapp",
        "tipo",
        "tipo-trabajo",
        "jornada",
        "disponibilidad",
        "traslado",
        "discapacidad",
      ];
      campos.forEach((c) => {
        const el = document.getElementById(c);
        if (el && localStorage.getItem("formulario_" + c)) {
          el.value = localStorage.getItem("formulario_" + c);
        }
      });
    });

    // Función para guardar en localStorage
    function guardarLocalStorage(nombre, valor) {
      localStorage.setItem("formulario_" + nombre, valor);
    }

    // Cuando haga clic en “Guardar y Continuar”
    document
      .getElementById("btn-guardar-pers")
      .addEventListener("click", function () {
        // Validaciones mínimas: Nombre y Apellidos siempre, y al menos Email o WhatsApp.
        const nombre = document.getElementById("nombre").value.trim();
        const apellidos = document.getElementById("apellidos").value.trim();
        const email = document.getElementById("email").value.trim();
        const whatsapp = document.getElementById("whatsapp").value.trim();

        if (!nombre || !apellidos) {
          alert("Debes completar Nombre y Apellidos para continuar.");
          return;
        }
        if (!email && !whatsapp) {
          document.getElementById("contact-warning").style.display = "block";
          return;
        } else {
          document.getElementById("contact-warning").style.display = "none";
        }

        // Guardar cada campo en localStorage
        const camposAGuardar = [
          "nombre",
          "apellidos",
          "email",
          "whatsapp",
          "tipo",
          "tipo-trabajo",
          "jornada",
          "disponibilidad",
          "traslado",
          "discapacidad",
        ];
        camposAGuardar.forEach((campo) => {
          const el = document.getElementById(campo);
          if (el) guardarLocalStorage(campo, el.value.trim());
        });

        // Redirigir a la página de Soft Skills
        window.location.href = "softskills.html";
      });
  </script>
</body>
</html>
