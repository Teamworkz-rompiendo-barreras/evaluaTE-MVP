<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EvalúaTE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .form-container {
            background-color: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .soft-skills {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #0B474B;
        }
        button {
            padding: 10px 15px;
            background-color: #E6CB62;
            color: #0B474B;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #d6b848;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>EvalúaTE</h1>
        <form id="cvForm" enctype="multipart/form-data">
            <label for="nombre">Nombre completo</label>
            <input type="text" name="nombre" required /><br /><br />

            <label for="cv">Sube tu CV (PDF)</label>
            <input type="file" name="cv" accept="application/pdf" required /><br /><br />

            <button type="submit">Enviar CV</button>
        </form>
    </div>

    <div class="soft-skills">
        <h2>Evaluación de Soft Skills</h2>
        <p>Haz clic en cada habilidad para realizar la prueba correspondiente:</p>
        <div>
            <button onclick="window.location.href='minijuegos/toma-decisiones.html'">Toma de decisiones</button>
            <button disabled>Resolución de problemas</button>
            <button disabled>Comunicación</button>
            <button disabled>Adaptabilidad</button>
            <button disabled>Gestión del tiempo</button>
            <button disabled>Trabajo en equipo</button>
            <button disabled>Creatividad</button>
            <button disabled>Pensamiento crítico</button>
            <button disabled>Inteligencia emocional</button>
            <button disabled>Liderazgo</button>
        </div>
    </div>

</body>
</html>
