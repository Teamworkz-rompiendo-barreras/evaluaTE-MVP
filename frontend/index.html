<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EvalúaTE - Evaluación de Empleabilidad</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 2rem; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input, select, textarea, button { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #0B474B; color: white; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        button:hover { background-color: #083e41; }
    </style>
</head>
<body>
    <div style="text-align: center; margin: 20px;">
  <a href="decisiones.html">
    <button style="padding: 10px 20px; font-size: 16px; background-color: #0B474B; color: white; border: none; border-radius: 5px;">
      Evaluar pensamiento crítico
    </button>
  </a>
</div>
<div class="form-container">
    <h1>EvalúaTE</h1>
    <form id="cvForm" enctype="multipart/form-data">
        <label for="nombre">Nombre completo</label>
        <input type="text" name="nombre" required>

        <label for="apellidos">Apellidos</label>
        <input type="text" name="apellidos" required>

        <label for="email">Correo electrónico</label>
        <input type="email" name="email" required>

        <label for="discapacidad">¿Tienes certificado de discapacidad?</label>
        <select name="discapacidad" required>
            <option value="sí">Sí</option>
            <option value="no">No</option>
        </select>

        <label for="interes">¿Qué tipo de trabajos te gustaría hacer?</label>
        <textarea name="interes" rows="3" placeholder="Ejemplo: trabajos creativos, atención al público, análisis de datos..."></textarea>

        <label for="cv">Sube tu CV (PDF)</label>
        <input type="file" name="cv" accept="application/pdf" required>

        <button type="submit">Enviar</button>
    </form>
    <div id="respuesta" style="margin-top: 1rem;"></div>
</div>

<script>
document.getElementById('cvForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);

    const response = await fetch('https://<TU_FUNCTION_APP>.azurewebsites.net/api/UploadCV?code=<TU_CODE>', {
        method: 'POST',
        body: data
    });

    const result = await response.json();
    document.getElementById('respuesta').innerText = JSON.stringify(result, null, 2);
});
</script>
</body>
</html>
