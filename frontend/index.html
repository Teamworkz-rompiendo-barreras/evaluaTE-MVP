<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EvalúaTE — Datos Personales</title>
  <link rel="stylesheet" href="estilos.css"/>
</head>
<body>
  <header class="site-header">
  <a href="index.html" aria-label="Volver a la página de inicio">
  <img src="Logo_teamworkz.png" alt="Logo Teamworkz" class="site-logo" />
</a>
  <h1 class="site-title">EvalúaTE</h1>
</header>

  <main>
    <form id="form-datos" class="form-wrapper" novalidate>
      <!-- Nombre -->
      <div class="form-field">
        <label for="nombre">Nombre <span aria-hidden="true">*</span></label>
        <input type="text" id="nombre" name="nombre"
               required minlength="2" maxlength="40" autocomplete="off"
               aria-describedby="help-nombre"/>
        <div id="help-nombre" class="field-hint">Entre 2 y 40 caracteres.</div>
      </div>

      <!-- Apellidos -->
      <div class="form-field">
        <label for="apellidos">Apellidos <span aria-hidden="true">*</span></label>
        <input type="text" id="apellidos" name="apellidos"
               required minlength="2" maxlength="40" autocomplete="off"
               aria-describedby="help-apellidos"/>
        <div id="help-apellidos" class="field-hint">Entre 2 y 40 caracteres.</div>
      </div>

      <!-- Email y WhatsApp -->
      <fieldset class="form-field" aria-describedby="help-contacto">
        <legend>Contacto (al menos uno) <span aria-hidden="true">*</span></legend>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="ejemplo@dominio.com"/>
        </div>
        <div>
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" id="whatsapp" name="whatsapp"
                 pattern="^\\+?\\d{7,15}$" inputmode="tel"
                 placeholder="+34 600112233"/>
        </div>
        <div id="help-contacto" class="field-hint">
          Indica al menos Email o WhatsApp.
        </div>
      </fieldset>
      <div id="alerta-contacto" class="field-error" aria-live="polite" style="margin-top: 0.5rem;"></div>

      <!-- Tipo de puesto -->
      <div class="form-field">
        <label for="puesto">Tipo de puesto deseado <span aria-hidden="true">*</span></label>
        <input list="puestos" id="puesto" name="puesto" required 
               placeholder="Ej. Administrativo, almacén…"/>
        <datalist id="puestos">
          <option value="Administrativo">
          <option value="Atención al cliente">
          <option value="Almacén">
          <option value="Jardinero">
          <option value="Soporte técnico">
          <!-- …15–20 opciones más… -->
        </datalist>
      </div>

      <!-- Modalidad -->
      <div class="form-field">
        <label for="modalidad">Modalidad <span aria-hidden="true">*</span></label>
        <select id="modalidad" name="modalidad" required>
          <option value="" disabled selected>Selecciona modalidad</option>
          <option value="Presencial">Presencial</option>
          <option value="Remoto">Remoto</option>
          <option value="Híbrido">Híbrido</option>
        </select>
      </div>

      <!-- Jornada -->
      <div class="form-field">
        <label for="jornada">Jornada <span aria-hidden="true">*</span></label>
        <select id="jornada" name="jornada" required>
          <option value="" disabled selected>Selecciona jornada</option>
          <option value="Completa">Completa</option>
          <option value="Parcial">Parcial</option>
        </select>
      </div>

      <!-- Disponibilidad -->
      <div class="form-field">
        <label for="disponibilidad">Disponibilidad horaria <span aria-hidden="true">*</span></label>
        <input type="text" id="disponibilidad" name="disponibilidad" required
               placeholder="Mañanas, tardes, inmediata…"/>
      </div>

      <!-- Traslado -->
      <div class="form-field">
        <label for="traslado">¿Trasladarte? <span aria-hidden="true">*</span></label>
        <select id="traslado" name="traslado" required>
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="Sí">Sí</option>
          <option value="No">No</option>
        </select>
      </div>

      <!-- Discapacidad -->
      <div class="form-field">
        <label for="discap">Certificado de discapacidad <span aria-hidden="true">*</span></label>
        <select id="discap" name="discapacidad" required>
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="Sí">Sí</option>
          <option value="No">No</option>
        </select>
      </div>

     <!-- Botón -->
      <div class="form-field">
        <button type="submit" class="primary-btn">Ir a evaluación de Soft Skills</button>
      </div>
    </form>
  </main>

  <script>
    const form = document.getElementById('form-datos');
    const alerta = document.getElementById('alerta-contacto');
    form.addEventListener('submit', e => {
      const email = form.email.value.trim();
      const whatsapp = form.whatsapp.value.trim();
      if (!email && !whatsapp) {
        e.preventDefault();
        alerta.textContent = 'Indica al menos un e-mail o un WhatsApp.';
        return;
      }
      // Guardar en localStorage
      const datos = {
        nombre: form.nombre.value.trim(),
        apellidos: form.apellidos.value.trim(),
        email, whatsapp,
        puesto: form.puesto.value.trim(),
        modalidad: form.modalidad.value,
        jornada: form.jornada.value,
        disponibilidad: form.disponibilidad.value.trim(),
        traslado: form.traslado.value,
        discapacidad: form.discap.value
      };
      localStorage.setItem('usuario', JSON.stringify(datos));
      window.location.href = '/softskills';
    });
  </script>
</body>
</html>
