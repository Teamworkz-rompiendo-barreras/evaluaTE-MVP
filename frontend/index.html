<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvalúaTE - Datos personales</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <div class="main-wrapper">
    <h1>EvalúaTE</h1>
    <p>Completa tus datos para empezar la evaluación.</p>

    <form id="form-datos">
      <div class="form-row">
        <div>
          <label for="nombre">Nombre <span class="field-required">*</span></label>
          <input type="text" id="nombre" required />
        </div>
        <div>
          <label for="apellidos">Apellidos <span class="field-required">*</span></label>
          <input type="text" id="apellidos" required />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Opcional, pero rellena al menos uno" />
        </div>
        <div>
          <label for="whatsapp">WhatsApp</label>
          <input type="tel" id="whatsapp" placeholder="Opcional, pero rellena al menos uno" />
        </div>
      </div>

      <label for="tipo">Modalidad deseada <span class="field-required">*</span></label>
      <input type="text" id="tipo" placeholder="Ej. Remoto, Presencial" required />

      <label for="puesto">Puesto deseado <span class="field-required">*</span></label>
      <input type="text" id="puesto" placeholder="Ej. Auxiliar administrativo" required />

      <label for="jornada">Tipo de jornada <span class="field-required">*</span></label>
      <select id="jornada" required>
        <option value="">Selecciona jornada</option>
        <option value="completa">Completa</option>
        <option value="parcial">Parcial</option>
        <option value="intensiva">Intensiva</option>
      </select>

      <label for="disponibilidad">Disponibilidad (horaria, inmediata, otras...)</label>
      <input type="text" id="disponibilidad" placeholder="Ej. Mañanas, inmediata, tardes..." />

      <label for="traslado">¿Estarías dispuesto/a a trasladarte?</label>
      <select id="traslado">
        <option value="">Selecciona una opción</option>
        <option value="sí">Sí</option>
        <option value="no">No</option>
        <option value="depende">Depende</option>
      </select>

      <label for="discapacidad">¿Tienes certificado de discapacidad? <span class="field-required">*</span></label>
      <select id="discapacidad" required>
        <option value="">Selecciona una opción</option>
        <option value="sí">Sí</option>
        <option value="no">No</option>
      </select>

      <button type="submit">Siguiente: Autoevaluación</button>
    </form>
  </div>

  <script>
    document.getElementById('form-datos').addEventListener('submit', function(e) {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const apellidos = document.getElementById('apellidos').value.trim();
      const email = document.getElementById('email').value.trim();
      const whatsapp = document.getElementById('whatsapp').value.trim();
      const tipo = document.getElementById('tipo').value.trim();
      const puesto = document.getElementById('puesto').value.trim();
      const jornada = document.getElementById('jornada').value;
      const disponibilidad = document.getElementById('disponibilidad').value.trim();
      const traslado = document.getElementById('traslado').value;
      const discapacidad = document.getElementById('discapacidad').value;

      // Requiere al menos uno de email o whatsapp
      if (!email && !whatsapp) {
        alert('Debes rellenar al menos Email o WhatsApp.');
        return;
      }

      // Guardar en localStorage
      localStorage.setItem('formulario_nombre', nombre);
      localStorage.setItem('formulario_apellidos', apellidos);
      localStorage.setItem('formulario_email', email);
      localStorage.setItem('formulario_whatsapp', whatsapp);
      localStorage.setItem('formulario_tipo', tipo);
      localStorage.setItem('formulario_puesto', puesto);
      localStorage.setItem('formulario_jornada', jornada);
      localStorage.setItem('formulario_disponibilidad', disponibilidad);
      localStorage.setItem('formulario_traslado', traslado);
      localStorage.setItem('formulario_discapacidad', discapacidad);

      // Redirigir a softskills.html
      window.location.href = 'softskills.html';
    });
  </script>
</body>
</html>
