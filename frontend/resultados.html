<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Informe de Empleabilidad</title>
  <link rel="stylesheet" href="estilos-inicio.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="main-wrapper" id="informe-wrapper" style="max-width: 650px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <img src="logo-teamworkz.png" alt="Teamworkz Logo" style="height: 50px;">
      <div style="font-size: 0.9em; color: #697477; text-align: right;">
        <span id="informe-fecha"></span>
      </div>
    </div>

    <h1 style="margin-bottom: 0.4em;">Informe de Empleabilidad</h1>
    <div style="color: #697477; margin-bottom: 16px;" id="informe-intro"></div>

    <div class="datos-básicos" style="margin-bottom: 24px;">
      <strong>Nombre:</strong> <span id="informe-nombre"></span><br>
      <strong>Email:</strong> <span id="informe-email"></span><br>
      <strong>WhatsApp:</strong> <span id="informe-whatsapp"></span>
    </div>

    <div class="bloque-section" id="informe-resumen" style="margin-bottom: 20px;"></div>

    <div class="bloque-section" style="margin-bottom: 20px;">
      <h2 style="color:#0b474b;font-size:1.18rem;">Fortalezas detectadas</h2>
      <ul id="informe-fortalezas" style="margin-left: 1.1em; margin-bottom: 0;"></ul>
    </div>

    <div class="bloque-section" style="margin-bottom: 20px;">
      <h2 style="color:#0b474b;font-size:1.18rem;">Oportunidades de mejora</h2>
      <ul id="informe-mejoras" style="margin-left: 1.1em; margin-bottom: 0;"></ul>
    </div>

    <div class="bloque-section" style="margin-bottom: 20px;">
      <h2 style="color:#0b474b;font-size:1.18rem;">Orientación laboral personalizada</h2>
      <div id="informe-orientacion"></div>
    </div>

    <div class="bloque-section" style="margin-bottom: 24px;">
      <strong>Conclusión:</strong>
      <div id="informe-conclusion" style="margin-top: 6px;"></div>
    </div>

    <div style="border-top:1px solid #eee; margin-top: 18px; padding-top: 8px; font-size: 0.88em; color:#697477;">
      Informe generado automáticamente por Teamworkz. Uso exclusivo de la persona candidata y/o la entidad que le acompaña.
    </div>
    <div style="text-align: center; margin-top: 30px;">
      <button id="descargar-pdf">Descargar informe en PDF</button>
    </div>
  </div>
  <script src="main.js"></script>
  <script>
    // Rellena la fecha del informe automáticamente
    document.getElementById('informe-fecha').innerText =
      new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });

    // Esta función debe llamarse con el objeto resultado que recibes del backend
    function mostrarInforme(info) {
      // Frase introductoria personalizada (puedes ajustar el texto como quieras)
      document.getElementById('informe-intro').innerText =
        `Informe personalizado de empleabilidad. Basado en tus datos, preferencias y resultados de autoevaluación.`;

      document.getElementById('informe-nombre').innerText = (info.nombre || '') + ' ' + (info.apellidos || '');
      document.getElementById('informe-email').innerText = info.email || '';
      document.getElementById('informe-whatsapp').innerText = info.whatsapp || '';

      document.getElementById('informe-resumen').innerHTML = info.resumen || '';
      document.getElementById('informe-orientacion').innerHTML = info.orientacion || '';
      document.getElementById('informe-conclusion').innerHTML = info.conclusion || '';

      // Fortalezas
      let fortalezas = info.fortalezas || [];
      if (typeof fortalezas === 'string') fortalezas = [fortalezas];
      document.getElementById('informe-fortalezas').innerHTML =
        fortalezas.map(f => `<li>${f}</li>`).join('');

      // Mejoras
      let mejoras = info.areas_mejora || info.mejoras || [];
      if (typeof mejoras === 'string') mejoras = [mejoras];
      document.getElementById('informe-mejoras').innerHTML =
        mejoras.map(m => `<li>${m}</li>`).join('');
    }

    // Para que main.js pueda usar mostrarInforme
    window.mostrarInforme = mostrarInforme;

    // Botón PDF: descarga solo el bloque del informe, con formato
    document.getElementById('descargar-pdf').addEventListener('click', () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'pt', 'a4');
      // Captura solo el contenido visual del informe
      const informe = document.getElementById('informe-wrapper');
      doc.html(informe, {
        callback: function (doc) {
          doc.save('informe-empleabilidad.pdf');
        },
        margin: [15, 15, 15, 15],
        x: 10,
        y: 10,
        width: 560,
        windowWidth: 800
      });
    });
  </script>
</body>
</html>
