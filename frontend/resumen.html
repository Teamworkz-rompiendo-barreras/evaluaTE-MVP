<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resumen de resultados</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0ebE5;
      color: #0b474b;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 750px;
      margin: auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 1.1em;
    }
    th, td {
      border-bottom: 1px solid #e6cb62;
      padding: 12px 8px;
      text-align: left;
    }
    th {
      background-color: #e6cb62;
      color: #0b474b;
    }
    .pending {
      color: #a94442;
      font-weight: bold;
    }
    .done {
      color: #4caf50;
      font-weight: bold;
    }
    #enviarBtn {
      background-color: #e6cb62;
      color: #0b474b;
      border: none;
      padding: 14px 30px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 30px auto 0 auto;
      transition: background-color 0.3s;
    }
    #enviarBtn:disabled {
      background-color: #ccc;
      color: #888;
      cursor: not-allowed;
    }
    .resumen-final {
      margin-top: 30px;
      padding: 20px;
      background: #f7f5ef;
      border-radius: 10px;
      border-left: 5px solid #e6cb62;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Resumen de Resultados</h1>
    <table>
      <thead>
        <tr>
          <th>Competencia</th>
          <th>Estado</th>
          <th>Puntuación</th>
        </tr>
      </thead>
      <tbody id="resultados-tbody"></tbody>
    </table>
    <div id="aviso" class="pending" style="text-align:center; margin-bottom:15px;"></div>
    <button id="enviarBtn" disabled>Enviar todo y ver mi informe</button>

    <div id="resumen-final" class="resumen-final" style="display:none;">
      <h2>Previsualización de tu perfil</h2>
      <div id="perfil-info"></div>
    </div>
  </div>

  <script>
    // Lista de minijuegos (asegúrate que los IDs coinciden con el localStorage)
    const minijuegos = [
      { id: 'decisiones', nombre: 'Toma de decisiones' },
      { id: 'resolucion', nombre: 'Resolución de problemas' },
      { id: 'comunicacion', nombre: 'Comunicación' },
      { id: 'adaptabilidad', nombre: 'Adaptabilidad' },
      { id: 'tiempo', nombre: 'Gestión del tiempo' },
      { id: 'equipo', nombre: 'Trabajo en equipo' },
      { id: 'creatividad', nombre: 'Creatividad' },
      { id: 'pensamiento', nombre: 'Pensamiento crítico' },
      { id: 'emocional', nombre: 'Inteligencia emocional' },
      { id: 'liderazgo', nombre: 'Liderazgo' }
    ];

    const tbody = document.getElementById('resultados-tbody');
    let pendientes = 0;
    let resultados = [];

    minijuegos.forEach(juego => {
      const score = localStorage.getItem('minijuego_' + juego.id + '_score');
      const hecho = !!score;
      if (!hecho) pendientes++;
      resultados.push({ ...juego, score: score ? score : null });

      const estado = hecho
        ? '<span class="done">Completado</span>'
        : '<span class="pending">Pendiente</span>';

      const fila = `
        <tr>
          <td>${juego.nombre}</td>
          <td>${estado}</td>
          <td>${score !== null ? score + ' / 3' : '-'}</td>
        </tr>
      `;
      tbody.innerHTML += fila;
    });

    const aviso = document.getElementById('aviso');
    const enviarBtn = document.getElementById('enviarBtn');
    if (pendientes > 0) {
      aviso.textContent = `Te falta completar ${pendientes} prueba(s). Completa todas para enviar tu perfil.`;
      enviarBtn.disabled = true;
    } else {
      aviso.textContent = "¡Todas las pruebas completadas! Puedes enviar y ver tu informe.";
      enviarBtn.disabled = false;
    }

    // Previsualización sencilla y redirección al informe real
    enviarBtn.addEventListener('click', () => {
      // Previsualización
      const perfilInfo = document.getElementById('perfil-info');
      let html = "<ul>";
      resultados.forEach(r => {
        html += `<li><b>${r.nombre}:</b> ${r.score} / 3</li>`;
      });
      html += "</ul>";
      perfilInfo.innerHTML = html;
      document.getElementById('resumen-final').style.display = 'block';
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

      // Redirige a la página de informe real tras 1,5 segundos
      setTimeout(() => {
        window.location.href = "resultados.html"; // Cambia a "informe.html" si así se llama tu informe final
      }, 1500);
    });
  </script>
</body>
</html>
