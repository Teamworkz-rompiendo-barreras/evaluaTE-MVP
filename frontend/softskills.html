<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación Soft Skills</title>
  <!-- Enlazar CSS externo o usar <style> para demostración -->
  <link rel="stylesheet" href="estilos.css" />
  <style>
    /* Colores Teamworkz: amarillo #F2D680, azul #374BA6 */
    :root {
      --team-yellow: #F2D680;
      --team-blue: #374BA6;
      --text-dark: #000;
      --bg-light: #FFF;
      --focus-outline: 3px solid #374BA6;
      --font-base: 1rem;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: var(--font-base);
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.5;
    }
    header, main, nav, footer {
      max-width: 800px;
      margin: auto;
      padding: 1rem;
    }
    nav#stepper {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      list-style: none;
      padding: 0;
    }
    nav#stepper li {
      flex: 1;
      text-align: center;
      position: relative;
    }
    nav#stepper li::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -50%;
      width: 100%;
      height: 4px;
      background: var(--team-yellow);
      z-index: -1;
    }
    nav#stepper li:last-child::after { display: none; }
    nav#stepper li.active > span {
      background: var(--team-blue);
      color: #FFF;
    }
    nav#stepper span {
      display: inline-block;
      padding: 0.5rem;
      border-radius: 50%;
      background: var(--team-yellow);
      width: 2rem;
      height: 2rem;
      line-height: 1.2;
    }
    section[role="region"] {
      margin-bottom: 1rem;
      padding: 1rem;
      border: 2px solid var(--team-yellow);
      border-radius: 0.5rem;
    }
    #pregunta, #opciones, #contador {
      margin-bottom: 1rem;
    }
    #opciones button {
      display: block;
      width: 100%;
      margin-bottom: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
      background: var(--bg-light);
      border: 2px solid var(--team-blue);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: transform 0.2s ease-in-out;
    }
    #opciones button:focus,
    #opciones button:hover {
      outline: var(--focus-outline);
      transform: scale(1.02);
    }
    #siguiente {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: var(--team-blue);
      color: #FFF;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    #siguiente:focus {
      outline: var(--focus-outline);
    }
  </style>
</head>
<body>
  <header>
    <h1>Evaluación de Soft Skills</h1>
    <nav aria-label="Progreso" id="stepper">
      <li class="active"><span>1</span><div>Minijuegos</div></li>
      <li><span>2</span><div>Subir CV</div></li>
      <li><span>3</span><div>Preferencias</div></li>
      <li><span>4</span><div>Resultados</div></li>
    </nav>
  </header>
  <main>
    <div id="evaluacion-softskills">
      <!-- Intro, pregunta y opciones inyectadas por JS -->
    </div>
    <button id="siguiente" aria-label="Siguiente paso">Siguiente</button>
  </main>
  <script src="softskills.js"></script>
</body>
</html>
