<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación de Habilidades</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #0b474b;
    }
    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }
    .card {
      width: 160px;
      height: 160px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      text-decoration: none;
      color: #0b474b;
      border: 2px solid transparent;
    }
    .card:hover {
      transform: scale(1.05);
      background: #e6cb62;
    }
    .card.completed {
      background: #d0edd5;
      color: #0b474b;
      border-color: #2eb872;
    }
    .volver-btn {
      display: block;
      margin: 40px auto 0 auto;
      padding: 12px 32px;
      font-size: 1.1em;
      border-radius: 8px;
      background: #e6cb62;
      color: #0b474b;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .volver-btn:hover {
      background: #d1b748;
    }
  </style>
</head>
<body>
  <h1>Selecciona una habilidad para evaluarte</h1>
  <p class="subtitle">Haz clic en una tarjeta para comenzar la evaluación de esa competencia</p>
  <div class="cards" id="cards-container">
    <!-- Los botones se generan dinámicamente -->
  </div>
  <button class="volver-btn" onclick="window.location.href='index.html'">
    ⬅️ Volver a inicio
  </button>

  <script>
    // Lista de habilidades y sus rutas
    const skills = [
      { id: "decisiones", nombre: "Toma de decisiones", ruta: "minijuegos/decisiones.html" },
      { id: "resolucion", nombre: "Resolución de problemas", ruta: "minijuegos/resolucion.html" },
      { id: "comunicacion", nombre: "Comunicación", ruta: "minijuegos/comunicacion.html" },
      { id: "adaptabilidad", nombre: "Adaptabilidad", ruta: "minijuegos/adaptabilidad.html" },
      { id: "tiempo", nombre: "Gestión del tiempo", ruta: "minijuegos/tiempo.html" },
      { id: "equipo", nombre: "Trabajo en equipo", ruta: "minijuegos/equipo.html" },
      { id: "creatividad", nombre: "Creatividad", ruta: "minijuegos/creatividad.html" },
      { id: "pensamiento", nombre: "Pensamiento crítico", ruta: "minijuegos/pensamiento.html" },
      { id: "emocional", nombre: "Inteligencia emocional", ruta: "minijuegos/emocional.html" },
      { id: "liderazgo", nombre: "Liderazgo", ruta: "minijuegos/liderazgo.html" }
    ];

    // Lee de localStorage qué pruebas están completadas
    function getCompletadas() {
      try {
        return JSON.parse(localStorage.getItem("pruebasCompletadas")) || {};
      } catch {
        return {};
      }
    }

    // Renderiza las tarjetas
    function renderCards() {
      const container = document.getElementById("cards-container");
      const completadas = getCompletadas();
      skills.forEach(skill => {
        const link = document.createElement("a");
        link.href = skill.ruta;
        link.className = "card" + (completadas[skill.id] ? " completed" : "");
        link.innerText = skill.nombre;
        container.appendChild(link);
      });
    }

    renderCards();
  </script>
</body>
</html
