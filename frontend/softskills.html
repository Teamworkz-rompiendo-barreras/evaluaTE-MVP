<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvalúaTE — Evaluación de Soft Skills</title>
  <link rel="stylesheet" href="estilos.css" />
  <style>
    html { font-size: 1.25rem; }
    body {
      font-family: 'Inter', 'Atkinson Hyperlegible', Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #454545;
      background: #FFF;
    }
    header.site-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #F2D680;
    }
    .site-logo {
      width: 120px;
      height: auto;
    }
    header.site-header h1 {
      font-size: 2rem;
      color: #374BA6;
      margin: 0;
    }
    #game-shell {
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }
    #stepper {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
      position: sticky;
      top: 0;
      background: #FFF;
      padding: 0.5rem;
      border-bottom: 2px solid #E0E0E0;
      z-index: 10;
    }
    .step {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #E0E0E0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #FFF;
    }
    .step.completed { background: #374BA6; }
    .step.current { border: 4px solid #F2D680; background: #374BA6; }
    #minijuego-container {
      background: #F8F8F8;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
    }
    .ayuda {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .ayuda button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #374BA6;
      color: #FFF;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .tooltip {
      display: none;
      max-width: 280px;
      padding: 1rem;
      border-radius: 8px;
      background: #FFF;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      margin-top: 0.5rem;
    }
    .tooltip.active { display: block; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" aria-label="Volver a la página de inicio">
      <img src="Logo_teamworkz.png" alt="Logo Teamworkz" class="site-logo" />
    </a>
    <h1 class="site-title">EvalúaTE</h1>
  </header>
  <main>
    <div id="game-shell">
      <div id="stepper">
        <div class="step current">1</div>
        <div class="step">2</div>
        <div class="step">3</div>
        <div class="step">4</div>
        <div class="step">5</div>
        <div class="step">6</div>
        <div class="step">7</div>
        <div class="step">8</div>
        <div class="step">9</div>
        <div class="step">10</div>
      </div>
      <div id="minijuego-container">
        <!-- Aquí se cargará dinámicamente cada minijuego -->
        <p>Este es el espacio reservado para los minijuegos.</p>
      </div>
      <div class="ayuda">
        <button aria-label="Ayuda" onclick="toggleTooltip()">?</button>
        <span class="ayuda-texto">Ayuda</span>
      </div>
      <div class="tooltip" id="tooltip">
        Si necesitas ayuda con esta pantalla, puedes pulsar este botón para obtener más información sobre cómo jugar.
      </div>
    </div>
  </main>
  <script>
    function toggleTooltip() {
      const tooltip = document.getElementById('tooltip');
      tooltip.classList.toggle('active');
    }
  </script>
</body>
</html>
