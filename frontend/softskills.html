<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación de Soft Skills</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    .skills-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #0b474b;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background-color: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 180px;
    }
    .card:hover {
      transform: translateY(-5px);
      background-color: #f9f3d2;
    }
    .card-title {
      font-size: 20px;
      color: #0b474b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="skills-container">
    <h1>Selecciona una habilidad para evaluarte</h1>
    <div class="cards">
      <div class="card"><div class="card-title">Toma de decisiones</div></div>
      <div class="card"><div class="card-title">Resolución de problemas</div></div>
      <div class="card"><div class="card-title">Comunicación</div></div>
      <div class="card"><div class="card-title">Adaptabilidad</div></div>
      <div class="card"><div class="card-title">Gestión del tiempo</div></div>
      <div class="card"><div class="card-title">Trabajo en equipo</div></div>
      <div class="card"><div class="card-title">Creatividad</div></div>
      <div class="card"><div class="card-title">Pensamiento crítico</div></div>
      <div class="card"><div class="card-title">Inteligencia emocional</div></div>
      <div class="card"><div class="card-title">Liderazgo</div></div>
    </div>
  </div>
</body>
</html>
