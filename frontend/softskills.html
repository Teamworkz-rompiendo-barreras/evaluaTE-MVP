<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación de Habilidades</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #0b474b;
    }
    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      padding: 20px;
      justify-items: center;
    }
    .card {
      width: 160px;
      height: 160px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease-in-out;
    }
    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Selecciona una habilidad para evaluarte</h1>
  <p class="subtitle">Haz clic en una tarjeta para comenzar la evaluación de esa competencia</p>
  <div class="cards">
    <a href="minijuegos/decisiones.html" class="card">Toma de decisiones</a>
    <a href="minijuegos/resolucion.html" class="card">Resolución de problemas</a>
    <a href="minijuegos/comunicacion.html" class="card">Comunicación</a>
    <a href="minijuegos/adaptabilidad.html" class="card">Adaptabilidad</a>
    <a href="minijuegos/tiempo.html" class="card">Gestión del tiempo</a>
    <a href="minijuegos/equipo.html" class="card">Trabajo en equipo</a>
    <a href="minijuegos/creatividad.html" class="card">Creatividad</a>
    <a href="minijuegos/pensamiento.html" class="card">Pensamiento crítico</a>
    <a href="minijuegos/emocional.html" class="card">Inteligencia emocional</a>
    <a href="minijuegos/liderazgo.html" class="card">Liderazgo</a>
  </div>
</body>
</html>
