<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subir CV</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <div class="container" style="text-align:center; margin-top:50px;">
    <h1>Sube tu CV en PDF</h1>
    <p>Selecciona tu currículum en PDF para que lo analicemos.</p>

    <label class="boton-principal" style="display:inline-block; cursor:pointer;">
      <i class="fas fa-file-upload"></i> Seleccionar archivo
      <input type="file" id="input-cv" accept=".pdf" style="display: none" />
    </label>

    <p id="nombre-archivo" style="margin-top: 16px;"></p>

    <button id="boton-continuar" class="boton-principal" disabled>Continuar</button>
  </div>

  <script>
    const inputCV = document.getElementById("input-cv");
    const nombreArchivo = document.getElementById("nombre-archivo");
    const botonContinuar = document.getElementById("boton-continuar");

    // Cuando se selecciona un archivo:
    inputCV.addEventListener("change", () => {
      const archivo = inputCV.files[0];
      if (archivo) {
        nombreArchivo.innerText = `Has seleccionado: ${archivo.name}`;
        botonContinuar.disabled = false;
      } else {
        nombreArchivo.innerText = "";
        botonContinuar.disabled = true;
      }
    });

    // Al hacer clic en “Continuar”, primero subimos el PDF al backend
    botonContinuar.addEventListener("click", async () => {
      if (!inputCV.files[0]) return;

      const formData = new FormData();
      formData.append("file", inputCV.files[0]);

      try {
        const response = await fetch("http://localhost:8000/api/subir-cv", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          alert("⚠️ Error al subir el CV. Intenta de nuevo.");
          return;
        }

        const data = await response.json();
        const cvText = data.cv_text || "";

        // Guardamos el texto completo del CV en localStorage
        localStorage.setItem("cv_text", cvText);

        // Redirigimos a la pantalla de resultados
        window.location.href = "resultados.html";
      } catch (err) {
        console.error(err);
        alert("❌ No hemos podido conectar con el servidor. Revisa que el backend esté activo.");
      }
    });
  </script>

  <!-- FontAwesome para los iconos -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
</body>
</html>
