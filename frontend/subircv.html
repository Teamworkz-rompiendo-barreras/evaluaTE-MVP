<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subir CV</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body>
  <div class="contenedor centrado">
    <h1 class="titulo">Sube tu CV</h1>
    <p class="texto-aclaracion">Elige tu currículum en PDF para que lo analicemos.</p>

    <label class="boton-subir">
      <i class="fas fa-file-pdf"></i> Seleccionar archivo
      <input type="file" id="input-cv" accept=".pdf" style="display: none" />
    </label>
    <p id="nombre-archivo" class="texto-archivo"></p>

    <button id="boton-subir-cv" class="boton-principal" disabled>Subir CV</button>
  </div>

  <script>
    const inputCV = document.getElementById("input-cv");
    const nombreArchivo = document.getElementById("nombre-archivo");
    const botonSubir = document.getElementById("boton-subir-cv");

    // Si cambia el input (archivo PDF seleccionado)
    inputCV.addEventListener("change", () => {
      const archivo = inputCV.files[0];
      if (archivo && archivo.name.toLowerCase().endsWith(".pdf")) {
        nombreArchivo.innerText = `Has seleccionado: ${archivo.name}`;
        botonSubir.disabled = false;
      } else {
        nombreArchivo.innerText = "Solo archivos PDF permitidos.";
        botonSubir.disabled = true;
      }
    });

    botonSubir.addEventListener("click", async () => {
      const archivo = inputCV.files[0];
      if (!archivo) return;

      // Crear FormData para enviar el PDF
      const formData = new FormData();
      formData.append("file", archivo);

      try {
        // Llamamos al endpoint /api/subir-cv
        const respuesta = await fetch("http://localhost:8000/api/subir-cv", {
          method: "POST",
          body: formData
        });
        if (!respuesta.ok) {
          alert("Error subiendo el CV al servidor: " + respuesta.statusText);
          return;
        }
        const data = await respuesta.json();
        // Guardamos el texto extraído en localStorage
        localStorage.setItem("cv_text", data.cv_text);

        // Avisamos al usuario y redirigimos a la página de resultados
        alert("CV subido correctamente. Ahora generarás tu informe.");
        window.location.href = "resultados.html";
      } catch (err) {
        console.error(err);
        alert("No se pudo conectar con el servidor para subir el CV.");
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></script>
</body>
</html>
