services:
  - type: web
    name: backend
    env: python
    repo: https://github.com/dani-garcia-p/nuevo-grupo-12
    region: frankfurt
    plan: free
    buildFilter:
      paths:
        - backend/**
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 8080"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
  - type: web
    name: frontend
    env: static
    repo: https://github.com/dani-garcia-p/nuevo-grupo-12
    region: frankfurt
    plan: free
    buildFilter:
      paths:
        - nuevo-frontend/**
    buildCommand: "pnpm install && pnpm build"
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
